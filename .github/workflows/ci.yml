name: ci
on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y shellcheck jq
      - name: actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          fail_on_error: true
      - name: Smoke tests (no API calls)
        run: ./tests/smoke.sh
