name: ci
on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y curl shellcheck jq
      - uses: extractions/setup-just@v2
      - name: actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          fail_level: error
      - name: Check CI dependencies
        run: make check DEPS="curl jq shellcheck just"
      - name: Lint and smoke tests (no API calls)
        run: just all
